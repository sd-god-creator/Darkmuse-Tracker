  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }

};
const save = (key, val) => {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}

const fmt = (num, cur) => {
  const c = CURRENCIES[cur] || CURRENCIES.INR;
  const converted = num * c.rate;
  return c.symbol + (Math.abs(converted) < 0.01 ? "0.00" : converted.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }));
};
const fmtShort = (num, cur) => {
  const c = CURRENCIES[cur] || CURRENCIES.INR;
  const v = num * c.rate;
  if (Math.abs(v) >= 100000) return c.symbol + (v / 100000).toFixed(1) + "L";
  if (Math.abs(v) >= 1000) return c.symbol + (v / 1000).toFixed(1) + "K";
  return c.symbol + v.toFixed(0);
};
